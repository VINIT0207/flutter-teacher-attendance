
name: teacher_attendance_app
description: A highly interactive and user-friendly Flutter-based app for teachers to track attendance.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.1.3  
  
  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1
  
  # Database
  sqflite_common_ffi: ^2.3.0+1
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # UI components
  cupertino_icons: ^1.0.6
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^0.65.0
  
  # Utilities
  intl: ^0.19.0
  csv: ^5.1.1
  excel: ^4.0.3
  file_picker: ^10.1.9
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/app_icon.png" 

flutter:
  uses-material-design: true
  assets:
    - 'lib/assets/logo/app_icon.png' 